# Default build-time config used by the Dockerfile collectstatic command.
# Runtime deployments should override these values via PROJECT_CONFIG_PATH.

[email]
from=test_email
host=localhost
port=25
mailing_list=test_email
send_to_mailing_list=false

[settings]
DEBUG = False
ALLOWED_HOSTS = []
CSRF_TRUSTED_ORIGINS = []
CORS_ALLOWED_ORIGINS = []
AUTH_COOKIE_SECURE = False
STATIC_ROOT = /app/staticfiles
STATIC_URL = /static/
PUBLIC_APP_URL=localhost
MAX_DISEASE_NAME_LENGTH=255

[g2p]
version=1.0.0